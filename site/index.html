<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oscars 2026 Market Dashboard</title>
    <meta name="description" content="Live Polymarket pricing across all 24 Oscar award categories.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="hero">
            <div class="hero-copy hero-copy-compact">
                <div class="hero-topline">
                    <p class="eyebrow">Polymarket x Oscars 2026</p>
                    <p class="hero-updated-inline">Updated <span id="hero-updated">Loading...</span></p>
                </div>
                <h1>Oscar market board</h1>
                <p class="hero-text hero-text-compact">
                    Live category leaders and nominee boards across all 24 Oscar races.
                </p>
            </div>
        </header>

        <section class="controls-shell" aria-label="Dashboard controls">
            <div class="control-panel">
                <label class="control-field">
                    <span>Search</span>
                    <input id="category-search" type="search" placeholder="Search categories or nominees">
                </label>
                <label class="control-field control-field-select">
                    <span>Sort</span>
                    <select id="category-sort">
                        <option value="confidence">Highest confidence</option>
                        <option value="volume">Highest 24h volume</option>
                        <option value="tightest">Tightest races</option>
                        <option value="alphabetical">Alphabetical</option>
                    </select>
                </label>
            </div>
            <div class="pill-list" id="category-pills"></div>
        </section>

        <section class="grid-section" aria-labelledby="categories-title">
            <div class="section-heading">
                <div>
                    <p class="section-kicker">All markets</p>
                    <h2 id="categories-title">Category boards</h2>
                </div>
                <p class="section-note" id="results-summary">Loading categories...</p>
            </div>
            <div class="category-grid" id="category-grid"></div>
        </section>
    </div>

    <template id="empty-state-template">
        <article class="empty-state">
            <h3>No categories match this filter.</h3>
            <p>Try a broader search or switch the sorting mode.</p>
        </article>
    </template>

    <script src="app.js" defer></script>
</body>
</html>
